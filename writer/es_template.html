<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="uEI7553rw16YiXFdIpUoK6U56xdBShvXiblGYXHSprw" />
    <title>{{ SEO_TITLE }}</title>
    <meta name="description" content="{{ META_DESCRIPTION }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-card: rgba(20, 27, 45, 0.6);
            --text-main: #f0f4f8;
            --text-muted: #94a3b8;
            --accent-primary: #e11d48;
            --accent-secondary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #e11d48, #be123c);
            --border-glass: rgba(255, 255, 255, 0.08);
            --glow: 0 0 20px rgba(225, 29, 72, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.7;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(225, 29, 72, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
            background-attachment: fixed;
        }

        header {
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--accent-primary);
        }

        .container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            margin: 2.5rem 0 1rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: var(--accent-primary);
            border-radius: 4px;
        }

        h3 {
            font-size: 1.25rem;
            margin: 1.5rem 0 0.75rem;
            color: #cbd5e1;
        }

        p {
            margin-bottom: 1.25rem;
            color: var(--text-muted);
        }

        ul {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
            color: var(--text-muted);
        }

        li {
            margin-bottom: 0.5rem;
        }

        a {
            color: var(--accent-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        /* Call to Action Box */
        .cta-box {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            margin: 3rem 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), var(--glow);
        }

        .cta-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-gradient);
        }

        .cta-box h3 {
            color: white;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .cta-box p {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .cta-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 600px) {
            .cta-buttons {
                flex-direction: row;
            }
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            max-width: 300px;
        }

        .stream-button {
            background: #ff0000;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        .stream-button:hover {
            color: white;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.5);
        }

        .stats-button {
            background: var(--accent-secondary);
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .stats-button:hover {
            color: white;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5);
        }

        .match-time-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--accent-secondary);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 12px 12px 0;
        }

        .match-time-box h3 {
            margin-top: 0;
            color: var(--accent-secondary);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* Match Scoreboard / Header Banner */
        .match-banner {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .vs {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-primary);
            padding: 0 2rem;
            opacity: 0.8;
        }

        /* FAQ Styling generated by Gemini */
        .faq-section h3 {
            background: rgba(255,255,255,0.03);
            padding: 1rem 1.25rem;
            border-radius: 8px 8px 0 0;
            margin-bottom: 0;
            border: 1px solid var(--border-glass);
            border-bottom: none;
        }
        .faq-section p {
            background: rgba(0,0,0,0.2);
            padding: 1.25rem;
            border-radius: 0 0 8px 8px;
            border: 1px solid var(--border-glass);
            border-top: none;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 3rem 1.5rem;
            border-top: 1px solid var(--border-glass);
            margin-top: 4rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .match-banner {
                flex-direction: column;
                gap: 1rem;
            }
            .vs {
                padding: 0.5rem 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <a href="https://fifa-worldcup26.com/" class="logo">
                <i class="ph ph-soccer-ball"></i> World Cup 2026
            </a>
            <a href="https://fifa-worldcup26.com/matches/" style="color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500;">
                Ver Todos los Partidos <i class="ph ph-arrow-right" style="vertical-align: middle;"></i>
            </a>
        </div>
    </header>

    <main class="container">
        
        <div class="match-banner">
            <div class="team">
                <div class="team-name">{{ TEAM1 }}</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <div class="team-name">{{ TEAM2 }}</div>
            </div>
        </div>

        <h1>{{ TITLE }}</h1>

        <div class="article-content faq-section">
            {{ CONTENT }}
        </div>

    </main>

    <footer>
        <p>&copy; 2026 World Cup News & Previews. Todos los derechos reservados.</p>
        <p>Visita nuestro <a href="https://fifa-worldcup26.com/">portal principal</a> para más cobertura.</p>
    </footer>

</body>
</html>
