name: Spanish Parasite SEO Scheduler

on:
  schedule:
    # Run every day at 14:00 UTC (9:00 AM EST)
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

jobs:
  run-seo-writer:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run ES Parasite Writer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PAT: ${{ secrets.PAT }}
        run: |
          python es_parasite_writer.py
          
      - name: Commit processed matches tracker
        run: |
          git config --global user.name "Fifa Agent"
          git config --global user.email "agent@fifa-worldcup26.com"
          git add es_processed_matches.json || true
          git diff --staged --quiet || git commit -m "Update processed matches tracker"
          git push origin main || true
