name: FIFA News Agent - Scan

on:
  # Run every 45 minutes (fits free tier, gives time to review alerts)
  schedule:
    - cron: '*/45 * * * *'

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: agent-state
          key: fifa-agent-${{ hashFiles('config.py') }}-v2
          restore-keys: |
            fifa-agent-${{ hashFiles('config.py') }}-
            fifa-agent-

      - name: Prepare state directory
        run: |
          mkdir -p agent-state
          [ -f agent-state/agent.db ] && cp agent-state/agent.db . || true
          [ -f agent-state/pending_state.json ] && cp agent-state/pending_state.json . || true
          [ -f agent-state/latest_topics.json ] && cp agent-state/latest_topics.json . || true

      - name: Run news scan and handle commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python main.py --once

      - name: Save agent state
        if: always()
        run: |
          cp -f agent.db agent-state/ 2>/dev/null || true
          cp -f pending_state.json agent-state/ 2>/dev/null || true
          cp -f latest_topics.json agent-state/ 2>/dev/null || true
